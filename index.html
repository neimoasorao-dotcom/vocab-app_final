<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>LEAP 英単語学習</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --bg: #f4f7f4;
  --card: #ffffff;
  --primary: #2d7a4f;
  --primary-light: #e8f5ee;
  --primary-dark: #1f5c3a;
  --accent: #4a90d9;
  --red: #e05252;
  --green: #3cb371;
  --yellow: #f5a623;
  --text: #1a2e22;
  --muted: #5a7464;
  --border: #d6e8dc;
  --radius: 12px;
  --shadow: 0 2px 12px rgba(0,0,0,0.08);
}
html, body { height: 100%; font-family: system-ui, -apple-system, sans-serif; background: var(--bg); color: var(--text); }
button { font: inherit; cursor: pointer; border: none; border-radius: var(--radius); transition: all 0.15s; }
button:active { transform: scale(0.97); }
input { font: inherit; border-radius: var(--radius); border: 1.5px solid var(--border); padding: 10px 14px; outline: none; width: 100%; }
input:focus { border-color: var(--primary); }

/* ── Layout ── */
#app { display: flex; flex-direction: column; min-height: 100%; }

/* ── Top Bar ── */
#topbar {
  background: #fff;
  border-bottom: 1px solid var(--border);
  padding: 12px 16px;
  position: sticky; top: 0; z-index: 100;
  box-shadow: 0 1px 4px rgba(0,0,0,0.06);
}
#topbar h1 { font-size: 18px; font-weight: 800; color: var(--primary-dark); letter-spacing: 0.02em; }
#topbar .sub { font-size: 12px; color: var(--muted); margin-top: 1px; }

/* ── Nav ── */
#nav {
  display: flex; gap: 4px; overflow-x: auto; padding: 10px 16px;
  background: #fff; border-bottom: 1px solid var(--border);
  scrollbar-width: none;
}
#nav::-webkit-scrollbar { display: none; }
.nav-btn {
  flex-shrink: 0;
  padding: 8px 14px;
  border-radius: 999px;
  font-size: 13px; font-weight: 600;
  background: var(--primary-light);
  color: var(--primary-dark);
  border: 1.5px solid transparent;
}
.nav-btn.active {
  background: var(--primary);
  color: #fff;
  border-color: var(--primary-dark);
}

/* ── Main Content ── */
#content { flex: 1; padding: 16px; max-width: 900px; margin: 0 auto; width: 100%; }

/* ── Range Picker ── */
.range-bar {
  display: flex; align-items: center; gap: 8px; flex-wrap: wrap;
  background: #fff; border-radius: var(--radius); padding: 12px 14px;
  border: 1px solid var(--border); margin-bottom: 16px;
  box-shadow: var(--shadow);
}
.range-bar label { font-size: 13px; font-weight: 600; color: var(--muted); }
.range-bar input[type=number] { width: 72px; padding: 7px 10px; font-size: 13px; }
.range-preset {
  padding: 6px 11px; font-size: 12px; font-weight: 600;
  background: var(--primary-light); color: var(--primary-dark);
  border-radius: 999px; margin: 2px;
}
.range-preset.active { background: var(--primary); color: #fff; }
.range-presets { display: flex; flex-wrap: wrap; gap: 4px; margin-top: 6px; }

/* ── Word List (Study mode) ── */
.study-layout {
  display: grid;
  grid-template-columns: 280px 1fr;
  gap: 14px;
}
@media (max-width: 640px) {
  .study-layout { grid-template-columns: 1fr; }
  .study-list-panel { max-height: 220px; }
}
.study-list-panel {
  background: #fff; border-radius: var(--radius);
  border: 1px solid var(--border); overflow-y: auto;
  max-height: 65vh; box-shadow: var(--shadow);
}
.word-list-item {
  display: flex; align-items: center; gap: 10px;
  padding: 10px 14px; border-bottom: 1px solid #f0f5f2;
  cursor: pointer; transition: background 0.1s;
  font-size: 14px;
}
.word-list-item:hover { background: var(--primary-light); }
.word-list-item.selected { background: var(--primary-light); border-left: 3px solid var(--primary); }
.word-list-item .num { font-size: 11px; color: var(--muted); min-width: 28px; }
.word-list-item .w { font-weight: 700; }
.word-list-item .m { font-size: 12px; color: var(--muted); flex: 1; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.word-list-item .wrong-dot { width: 7px; height: 7px; border-radius: 50%; background: var(--red); flex-shrink: 0; }

.study-detail {
  background: #fff; border-radius: var(--radius);
  border: 1px solid var(--border); padding: 24px;
  box-shadow: var(--shadow);
}
.study-detail .word-en { font-size: 36px; font-weight: 900; color: var(--primary-dark); margin-bottom: 8px; }
.study-detail .word-num { font-size: 13px; color: var(--muted); margin-bottom: 16px; }
.study-detail .meanings-list { margin-bottom: 20px; }
.study-detail .meanings-list li { padding: 6px 0; font-size: 16px; border-bottom: 1px solid #f0f5f2; }
.study-detail .example { background: var(--primary-light); border-left: 3px solid var(--primary); padding: 12px 14px; border-radius: 0 8px 8px 0; font-size: 14px; line-height: 1.6; color: var(--text); margin-top: 8px; }
.study-detail .example .ex-en { font-weight: 600; margin-bottom: 4px; }
.study-detail .example .ex-jp { color: var(--muted); font-size: 13px; }
.study-nav-row { display: flex; gap: 10px; margin-top: 20px; }

/* ── Quiz / Test / Typing ── */
.quiz-card {
  background: #fff; border-radius: var(--radius);
  border: 1px solid var(--border); padding: 24px;
  box-shadow: var(--shadow); max-width: 600px; margin: 0 auto;
}
.quiz-progress { font-size: 13px; color: var(--muted); margin-bottom: 16px; text-align: center; }
.quiz-progress-bar { height: 4px; background: var(--border); border-radius: 2px; margin-bottom: 20px; }
.quiz-progress-bar-fill { height: 100%; background: var(--primary); border-radius: 2px; transition: width 0.3s; }
.quiz-question { font-size: 22px; font-weight: 800; text-align: center; margin-bottom: 28px; color: var(--text); line-height: 1.4; }
.quiz-type-label { text-align: center; font-size: 12px; color: var(--muted); font-weight: 600; margin-bottom: 8px; letter-spacing: 0.05em; text-transform: uppercase; }
.choices { display: flex; flex-direction: column; gap: 10px; }
.choice-btn {
  padding: 14px 18px; font-size: 15px; font-weight: 600;
  background: var(--primary-light); color: var(--text);
  border-radius: var(--radius); text-align: left;
  border: 1.5px solid var(--border);
}
.choice-btn:hover:not(:disabled) { background: #d4eedd; border-color: var(--primary); }
.choice-btn.correct { background: #e6f9ee; border-color: var(--green); color: var(--green); }
.choice-btn.wrong { background: #fdecea; border-color: var(--red); color: var(--red); }
.choice-btn:disabled { opacity: 0.75; cursor: default; }
.choice-key {
  display: inline-flex; align-items: center; justify-content: center;
  width: 20px; height: 20px; border-radius: 5px; font-size: 11px;
  background: rgba(0,0,0,0.07); color: var(--muted); font-weight: 800;
  margin-right: 10px; flex-shrink: 0; font-family: monospace;
}
@media (max-width: 640px) { .choice-key { display: none; } }

.result-box { margin-top: 20px; padding: 16px; border-radius: var(--radius); }
.result-box.ok { background: #e8f9ee; border: 1.5px solid var(--green); }
.result-box.ng { background: #fdecea; border: 1.5px solid var(--red); }
.result-box .result-icon { font-size: 28px; text-align: center; margin-bottom: 8px; }
.result-box .result-word { font-size: 22px; font-weight: 900; text-align: center; color: var(--primary-dark); margin-bottom: 6px; }
.result-box .result-meanings { font-size: 14px; color: var(--muted); text-align: center; }
.result-box .result-meanings span { display: inline-block; padding: 2px 8px; }

/* Typing */
.typing-input-row { display: flex; gap: 8px; margin-bottom: 12px; }
.typing-input-row input { font-size: 16px; font-weight: 600; }
.submit-btn {
  padding: 10px 20px; background: var(--primary); color: #fff;
  font-weight: 700; font-size: 15px; flex-shrink: 0; white-space: nowrap;
  width: auto !important;
}

/* ── List Mode ── */
.list-filters { display: flex; gap: 8px; margin-bottom: 12px; flex-wrap: wrap; }
.filter-btn { padding: 7px 14px; font-size: 13px; font-weight: 600; background: var(--primary-light); color: var(--primary-dark); border-radius: 999px; }
.filter-btn.active { background: var(--primary); color: #fff; }
.word-table { width: 100%; border-collapse: collapse; background: #fff; border-radius: var(--radius); overflow: hidden; box-shadow: var(--shadow); }
.word-table th { background: var(--primary); color: #fff; padding: 10px 14px; text-align: left; font-size: 13px; }
.word-table td { padding: 9px 14px; font-size: 14px; border-bottom: 1px solid #f0f5f2; }
.word-table tr:last-child td { border-bottom: none; }
.word-table tr:hover td { background: var(--primary-light); }
.word-table .td-no { color: var(--muted); font-size: 12px; width: 44px; }
.word-table .td-word { font-weight: 700; }
.word-table .td-meaning { color: var(--muted); font-size: 13px; }
.wrong-badge { display: inline-block; background: var(--red); color: #fff; border-radius: 999px; font-size: 10px; padding: 1px 6px; margin-left: 6px; }

/* ── Mode Selector ── */
.mode-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 20px; }
.mode-option {
  padding: 16px; font-size: 14px; font-weight: 700;
  background: #fff; color: var(--text);
  border-radius: var(--radius); border: 2px solid var(--border);
  text-align: center;
}
.mode-option.active { border-color: var(--primary); background: var(--primary-light); color: var(--primary-dark); }
.mode-option .mode-icon { font-size: 22px; display: block; margin-bottom: 6px; }

/* ── Big Action Buttons ── */
.btn-primary {
  padding: 14px 28px; background: var(--primary); color: #fff;
  font-weight: 800; font-size: 16px; width: 100%; margin-top: 8px;
  border-radius: var(--radius);
}
.btn-primary:hover { background: var(--primary-dark); }
.btn-secondary {
  padding: 12px 20px; background: var(--primary-light); color: var(--primary-dark);
  font-weight: 700; font-size: 14px; border-radius: var(--radius);
  border: 1.5px solid var(--border);
}
.btn-danger { background: #fdecea; color: var(--red); border: 1.5px solid var(--red); }
.btn-sm { padding: 8px 14px; font-size: 13px; }
.btn-row { display: flex; gap: 10px; margin-top: 14px; flex-wrap: wrap; }

/* ── Score Screen ── */
.score-card {
  background: #fff; border-radius: var(--radius); padding: 32px 24px;
  box-shadow: var(--shadow); text-align: center; max-width: 500px; margin: 0 auto;
}
.score-card .big-score { font-size: 56px; font-weight: 900; color: var(--primary-dark); line-height: 1; }
.score-card .score-label { font-size: 14px; color: var(--muted); margin-top: 8px; margin-bottom: 24px; }

/* ── Data Tools ── */
.data-section { background: #fff; border-radius: var(--radius); padding: 16px; border: 1px solid var(--border); margin-bottom: 14px; }
.data-section h3 { font-size: 15px; font-weight: 700; margin-bottom: 12px; }
.stat-row { display: flex; gap: 12px; flex-wrap: wrap; margin-bottom: 8px; }
.stat-chip { background: var(--primary-light); padding: 8px 14px; border-radius: 999px; font-size: 13px; font-weight: 600; color: var(--primary-dark); }

/* Next btn */
.next-btn {
  padding: 14px; background: var(--primary); color: #fff;
  font-weight: 800; font-size: 16px; width: 100%; margin-top: 16px;
  border-radius: var(--radius);
}

/* Empty state */
.empty { text-align: center; padding: 48px 24px; color: var(--muted); font-size: 15px; }

/* Scrollable content area */
.scroll-list { max-height: 70vh; overflow-y: auto; border-radius: var(--radius); }

/* ── Keyboard hints ── */
.kbd-hint {
  text-align: center; font-size: 12px; color: var(--muted);
  margin-top: 10px; display: flex; justify-content: center; gap: 12px; flex-wrap: wrap;
}
.kbd { display: inline-block; background: #f0f4f1; border: 1px solid #c8d9cd;
  border-bottom: 2px solid #b0c8b8; border-radius: 5px;
  padding: 2px 7px; font-size: 11px; font-weight: 700; color: var(--muted);
  font-family: monospace; line-height: 1.6;
}
/* Hide hints on mobile (touch devices don't need them) */
@media (max-width: 640px) { .kbd-hint { display: none; } }

/* ══════════════════════════════════════════
   📱 MOBILE ONLY  (max-width: 640px)
   ══════════════════════════════════════════ */
@media (max-width: 640px) {

  /* ── Bottom Navigation ── */
  #nav {
    position: fixed;
    bottom: 0; left: 0; right: 0;
    padding: 6px 4px calc(6px + env(safe-area-inset-bottom, 0px));
    justify-content: space-around;
    border-top: 1px solid var(--border);
    border-bottom: none;
    box-shadow: 0 -2px 16px rgba(0,0,0,0.10);
    z-index: 200;
    background: #fff;
    gap: 0;
  }
  .nav-btn {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 2px;
    padding: 6px 2px;
    border-radius: 10px;
    font-size: 9px;
    font-weight: 700;
    letter-spacing: 0.01em;
    background: transparent;
    color: var(--muted);
    border: none;
    min-width: 0;
  }
  .nav-btn .nav-icon { font-size: 20px; line-height: 1; }
  .nav-btn.active {
    background: var(--primary-light);
    color: var(--primary-dark);
    border: none;
  }

  /* ── Top Bar ── */
  #topbar { padding: 10px 14px; }
  #topbar h1 { font-size: 16px; }
  #topbar .sub { font-size: 11px; }
  #topbar-settings-btn { display: none; } /* settings accessible from bottom nav */

  /* ── Content area: leave room for bottom nav ── */
  #content {
    padding: 12px 12px calc(72px + env(safe-area-inset-bottom, 0px));
  }

  /* ── Range picker ── */
  .range-bar {
    flex-direction: column;
    align-items: stretch;
    gap: 10px;
    padding: 12px;
  }
  .range-bar > span {
    display: flex;
    align-items: center;
    gap: 6px;
    flex-wrap: wrap;
  }
  .range-bar input[type=number] { width: 64px; padding: 8px; font-size: 14px; }
  .range-presets { gap: 6px; }
  .range-preset { padding: 7px 12px; font-size: 12px; }

  /* ── Study mode ── */
  .study-layout { grid-template-columns: 1fr; gap: 0; }

  /* Tab switcher for study on mobile */
  .study-tabs {
    display: flex;
    background: #fff;
    border: 1px solid var(--border);
    border-radius: var(--radius) var(--radius) 0 0;
    overflow: hidden;
    border-bottom: none;
  }
  .study-tab-btn {
    flex: 1; padding: 11px 8px;
    font-size: 13px; font-weight: 700;
    background: #fff; color: var(--muted);
    border: none; border-radius: 0;
    border-bottom: 2px solid transparent;
  }
  .study-tab-btn.active { color: var(--primary-dark); border-bottom-color: var(--primary); background: var(--primary-light); }

  .study-list-panel {
    max-height: calc(100dvh - 260px);
    border-radius: 0 0 var(--radius) var(--radius);
    border-top: none;
  }
  .word-list-item { padding: 12px 14px; }
  .word-list-item .w { font-size: 15px; }

  .study-detail { border-radius: 0 0 var(--radius) var(--radius); padding: 18px 16px; }
  .study-detail .word-en { font-size: 30px; }
  .study-detail .meanings-list li { font-size: 15px; padding: 8px 0; }

  /* Sticky next button on mobile study */
  .study-nav-row {
    position: sticky;
    bottom: calc(72px + env(safe-area-inset-bottom, 0px));
    background: #fff;
    margin: 16px -16px -18px;
    padding: 12px 16px;
    border-top: 1px solid var(--border);
    box-shadow: 0 -2px 8px rgba(0,0,0,0.06);
    gap: 10px;
  }
  .study-nav-row button { padding: 14px; font-size: 15px; }

  /* ── Quiz / Test ── */
  .quiz-card {
    padding: 16px 14px;
    border-radius: var(--radius);
    box-shadow: none;
    border: 1px solid var(--border);
  }
  .quiz-question { font-size: 20px; margin-bottom: 20px; }
  .quiz-progress { font-size: 12px; margin-bottom: 12px; }

  .choices { gap: 8px; }
  .choice-btn {
    padding: 15px 14px;
    font-size: 15px;
    min-height: 52px;
    line-height: 1.3;
  }

  .result-box { margin-top: 14px; padding: 14px; }
  .result-box .result-word { font-size: 20px; }
  .result-box .result-meanings { font-size: 13px; }

  /* Sticky next btn in quiz */
  .next-btn {
    position: sticky;
    bottom: calc(72px + env(safe-area-inset-bottom, 0px));
    font-size: 16px;
    padding: 15px;
    margin-top: 12px;
    box-shadow: 0 -2px 12px rgba(0,0,0,0.10);
  }

  /* ── Typing ── */
  .typing-input-row { gap: 8px; }
  .typing-input-row input { font-size: 17px; padding: 13px 14px; }
  .submit-btn { padding: 13px 18px; font-size: 15px; }

  /* ── Mode selector ── */
  .mode-grid { grid-template-columns: 1fr 1fr; gap: 10px; }
  .mode-option { padding: 14px 10px; font-size: 13px; }
  .mode-option .mode-icon { font-size: 24px; margin-bottom: 4px; }

  /* ── Score card ── */
  .score-card { padding: 28px 18px; }
  .score-card .big-score { font-size: 48px; }
  .btn-row { gap: 8px; }
  .btn-row .btn-secondary { flex: 1; text-align: center; }

  /* ── Word list (table → card style) ── */
  .word-table thead { display: none; }
  .word-table, .word-table tbody, .word-table tr, .word-table td {
    display: block; width: 100%;
  }
  .word-table tr {
    padding: 10px 14px;
    border-bottom: 1px solid #f0f5f2;
    background: #fff;
  }
  .word-table tr:hover td { background: transparent; }
  .word-table tr:hover { background: var(--primary-light); }
  .word-table td { padding: 0; border: none; }
  .word-table .td-no {
    font-size: 10px; color: var(--muted);
    margin-bottom: 2px; display: block;
  }
  .word-table .td-word {
    font-size: 16px; font-weight: 800;
    color: var(--text); display: block;
    margin-bottom: 3px;
  }
  .word-table .td-meaning {
    font-size: 13px; color: var(--muted);
    display: block; line-height: 1.5;
  }
  .scroll-list { max-height: calc(100dvh - 240px); }

  /* ── Settings ── */
  .stat-row { gap: 8px; }
  .stat-chip { font-size: 12px; padding: 7px 12px; }
  .data-section { padding: 14px; }

  /* ── Headings ── */
  h2[style*="font-size:18px"] { font-size: 16px !important; }

  /* ── Buttons general ── */
  .btn-primary { padding: 15px; font-size: 16px; }
  .btn-secondary { padding: 12px 16px; font-size: 13px; }

  /* ── Empty state ── */
  .empty { padding: 36px 16px; }
}
</style>
</head>
<body>
<div id="app">
  <div id="topbar">
    <div style="display:flex;align-items:center;justify-content:space-between;">
      <div>
        <h1>📘 LEAP 英単語</h1>
        <div class="sub" id="topbar-sub">全2296語</div>
      </div>
      <button class="btn-secondary btn-sm" onclick="showSection('settings')">⚙ 設定</button>
    </div>
  </div>

  <div id="nav">
    <button class="nav-btn" onclick="showSection('study')"><span class="nav-icon">📖</span>学習</button>
    <button class="nav-btn" onclick="showSection('test')"><span class="nav-icon">📝</span>テスト</button>
    <button class="nav-btn" onclick="showSection('typing')"><span class="nav-icon">⌨</span>タイピング</button>
    <button class="nav-btn" onclick="showSection('review')"><span class="nav-icon">🔁</span>復習</button>
    <button class="nav-btn" onclick="showSection('wordlist')"><span class="nav-icon">📋</span>一覧</button>
    <button class="nav-btn" onclick="showSection('settings')"><span class="nav-icon">⚙</span>設定</button>
  </div>

  <div id="content">
    <div id="section-study" class="section" style="display:none"></div>
    <div id="section-test" class="section" style="display:none"></div>
    <div id="section-typing" class="section" style="display:none"></div>
    <div id="section-review" class="section" style="display:none"></div>
    <div id="section-wordlist" class="section" style="display:none"></div>
    <div id="section-settings" class="section" style="display:none"></div>
  </div>
</div>

<script>
// ── DATA ──
const WORDS = [
  {"no":1,"word":"agree","meanings":["賛成する", "意見が一致する", "合う"]},
  {"no":2,"word":"oppose","meanings":["反対する"]},
  {"no":3,"word":"advise","meanings":["忠告する"]},
  {"no":4,"word":"tip","meanings":["助言", "ヒント", "チップ", "先", "先端"]},
  {"no":5,"word":"discuss","meanings":["ついて話し合う", "議論する", "話題に出す"]},
  {"no":6,"word":"blame","meanings":["責任があるとする"]},
  {"no":7,"word":"argue","meanings":["主張する", "言い争う"]},
  {"no":8,"word":"claim","meanings":["主張する", "要求する", "主張する", "主張", "要求"]},
  {"no":9,"word":"complain","meanings":["文句を言う", "苦情を言う", "訴える"]},
  {"no":10,"word":"offer","meanings":["申し出る", "申し出", "値引き"]},
  {"no":11,"word":"suggest","meanings":["示唆する", "提案する"]},
  {"no":12,"word":"recommend","meanings":["推薦する", "勧める"]},
  {"no":13,"word":"grateful","meanings":["感謝している"]},

// ── STORAGE ──
let wrongSet = new Set(); // word indices (no)
let history = {}; // no -> {correct, total}

function loadStorage() {
  try {
    const w = localStorage.getItem('leap_wrong');
    if (w) wrongSet = new Set(JSON.parse(w));
    const h = localStorage.getItem('leap_history');
    if (h) history = JSON.parse(h);
  } catch(e) {}
}
function saveStorage() {
  try {
    localStorage.setItem('leap_wrong', JSON.stringify([...wrongSet]));
    localStorage.setItem('leap_history', JSON.stringify(history));
  } catch(e) {}
}
function markWrong(no) {
  wrongSet.add(no);
  if (!history[no]) history[no] = {correct:0,total:0};
  history[no].total++;
  saveStorage();
}
function markCorrect(no) {
  wrongSet.delete(no);
  if (!history[no]) history[no] = {correct:0,total:0};
  history[no].correct++;
  history[no].total++;
  saveStorage();
}

// ── HELPERS ──
function getRange(start, end) {
  return WORDS.filter(w => w.no >= start && w.no <= end);
}
function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length-1; i > 0; i--) {
    const j = Math.floor(Math.random()*(i+1));
    [a[i],a[j]] = [a[j],a[i]];
  }
  return a;
}
function randMeaning(w) {
  return w.meanings[Math.floor(Math.random()*w.meanings.length)];
}
function getChoices(correct, pool, isEn) {
  // 3 wrong choices
  const others = pool.filter(w => w.no !== correct.no);
  const shuffled = shuffle(others).slice(0, 3);
  const choices = shuffle([correct, ...shuffled]);
  return choices;
}
function escHtml(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// ── SECTION ROUTER ──
function showSection(name) {
  state.section = name;
  document.querySelectorAll('.section').forEach(el => el.style.display = 'none');
  document.querySelectorAll('.nav-btn').forEach((btn, i) => {
    const names = ['study','test','typing','review','wordlist','settings'];
    btn.classList.toggle('active', names[i] === name);
  });
  const sec = document.getElementById('section-' + name);
  sec.style.display = 'block';
  renderSection(name);
}

function renderSection(name) {
  switch(name) {
    case 'study': renderStudy(); break;
    case 'test': renderTestSetup(); break;
    case 'typing': renderTypingSetup(); break;
    case 'review': renderReview(); break;
    case 'wordlist': renderWordList(); break;
    case 'settings': renderSettings(); break;
  }
  document.getElementById('topbar-sub').textContent = `全${WORDS.length}語 | 間違い ${wrongSet.size}語`;
}

// ── RANGE WIDGET ──
function rangeWidget(id, start, end, onApply) {
  const presets = [[1,50],[51,100],[101,200],[201,300],[301,500],[501,1000],[1001,1500],[1501,2000],[2001,2296],[1,2296]];
  const presetLabels = ['1-50','51-100','101-200','201-300','301-500','501-1000','1001-1500','1501-2000','2001-2296','全て'];
  let html = `<div class="range-bar" id="rbar-${id}">
    <span><label>No.</label>&nbsp;
    <input type="number" id="r-start-${id}" value="${start}" min="1" max="${WORDS.length}" style="width:70px">
    &nbsp;〜&nbsp;
    <input type="number" id="r-end-${id}" value="${end}" min="1" max="${WORDS.length}" style="width:70px">
    &nbsp;<button class="btn-secondary btn-sm" onclick="applyRange('${id}')">適用</button></span>
    <div class="range-presets">`;
  presets.forEach((p,i) => {
    const active = (p[0]===start && p[1]===end) ? 'active' : '';
    html += `<button class="range-preset ${active}" onclick="applyRangePreset('${id}',${p[0]},${p[1]})">${presetLabels[i]}</button>`;
  });
  html += '</div></div>';
  return html;
}
window._rangeCallbacks = {};
function applyRange(id) {
  const s = parseInt(document.getElementById('r-start-'+id).value)||1;
  const e = parseInt(document.getElementById('r-end-'+id).value)||50;
  if (window._rangeCallbacks[id]) window._rangeCallbacks[id](s, e);
}
function applyRangePreset(id, s, e) {
  document.getElementById('r-start-'+id).value = s;
  document.getElementById('r-end-'+id).value = e;
  if (window._rangeCallbacks[id]) window._rangeCallbacks[id](s, e);
}

function renderStudy() {

  state.studyTab = state.studyTab || 'list'; // 'list' | 'detail'

    state.studyStart = s; state.studyEnd = e; state.studyIdx = 0;
    renderStudy();
  };
  const words = getRange(state.studyStart, state.studyEnd);
  if (!words.length) { sec.innerHTML = '<div class="empty">この範囲に単語がありません</div>'; return; }
  if (state.studyIdx >= words.length) state.studyIdx = 0;
  const cur = words[state.studyIdx];

  let listItems = words.map((w, i) => {
    const sel = i === state.studyIdx ? 'selected' : '';
    const wrongDot = wrongSet.has(w.no) ? '<span class="wrong-dot"></span>' : '';
    return `<div class="word-list-item ${sel}" onclick="studySelect(${i})">
      <span class="num">${w.no}</span>
      <span class="w">${escHtml(w.word)}</span>
      <span class="m">${escHtml(w.meanings[0])}</span>
      ${wrongDot}
    </div>`;
  }).join('');

  const ex = getExample(cur.word);
  let exHtml = ex ? `<div class="example"><div class="ex-en">${escHtml(ex.en)}</div><div class="ex-jp">${escHtml(ex.jp)}</div></div>` : '';

  const mobile = isMobile();
  const tabHtml = mobile ? `<div class="study-tabs">
    <button class="study-tab-btn ${state.studyTab==='list'?'active':''}" onclick="studyTab('list')">📋 単語一覧</button>
    <button class="study-tab-btn ${state.studyTab==='detail'?'active':''}" onclick="studyTab('detail')">📖 詳細</button>
  </div>` : '';

  const listStyle = mobile && state.studyTab !== 'list' ? 'display:none' : '';
  const detailStyle = mobile && state.studyTab !== 'detail' ? 'display:none' : '';

  sec.innerHTML = rangeWidget('study', state.studyStart, state.studyEnd) +
  tabHtml +
  `<div class="study-layout">
    <div class="study-list-panel" style="${listStyle}">${listItems}</div>
    <div class="study-detail" style="${detailStyle}">
      <div class="word-en">${escHtml(cur.word)}</div>
      <div class="word-num">No.${cur.no} &nbsp;|&nbsp; ${state.studyIdx+1} / ${words.length}</div>
      <ul class="meanings-list">${cur.meanings.map(m=>`<li>${escHtml(m)}</li>`).join('')}</ul>
      ${exHtml}
      <div class="study-nav-row">
        <button class="btn-secondary" onclick="studyPrev()">← 前へ</button>
        <button class="next-btn" style="flex:1;margin-top:0" onclick="studyNext()">次へ →</button>
      </div>
      <div class="kbd-hint">
        <span><span class="kbd">←</span> 前へ</span>
        <span><span class="kbd">→</span> / <span class="kbd">Space</span> / <span class="kbd">Enter</span> 次へ</span>
      </div>
    </div>
  </div>`;

  // scroll selected into view
  setTimeout(() => {
    const sel = document.querySelector('.word-list-item.selected');
    if (sel) sel.scrollIntoView({block:'nearest'});
  }, 50);
}
window.studyTab = function(tab) { state.studyTab = tab; renderStudy(); };
window.studySelect = function(i) {
  state.studyIdx = i;
  if (isMobile()) state.studyTab = 'detail';
  renderStudy();
};
window.studyNext = function() {
  const words = getRange(state.studyStart, state.studyEnd);
  state.studyIdx = Math.min(state.studyIdx + 1, words.length - 1);
  renderStudy();
};
window.studyPrev = function() {
  state.studyIdx = Math.max(state.studyIdx - 1, 0);
  renderStudy();
};

    <button class="btn-primary" onclick="startTest()">テスト開始</button>`;
}
window.setTestMode = function(m) { state.testMode = m; renderTestSetup(); };

window.startTest = function() {
  const pool = getRange(state.testStart, state.testEnd);
  if (pool.length < 4) { alert('範囲内の単語が4語以上必要です'); return; }
  state.testQueue = shuffle(pool);
  state.testQIdx = 0; state.testAnswered = false;
  state.testScore = 0; state.testWrong = [];
  renderTestQuestion();
};

function renderTestQuestion() {
  const sec = document.getElementById('section-test');
  const pool = getRange(state.testStart, state.testEnd);
  if (state.testQIdx >= state.testQueue.length) {
    renderTestScore();
    return;
  }
  const cur = state.testQueue[state.testQIdx];
  const choices = getChoices(cur, pool, state.testMode === 'en2jp');
  const total = state.testQueue.length;
  const pct = Math.round(state.testQIdx / total * 100);

  let questionText, choiceContent;
  if (state.testMode === 'en2jp') {
    questionText = escHtml(cur.word);
    choiceContent = choices.map((c, i) => {
      const m = randMeaning(c);
      return `<button class="choice-btn" onclick="answerTest(${c.no},${cur.no})" data-no="${c.no}"><span class="choice-key">${i+1}</span>${escHtml(m)}</button>`;
    }).join('');
  } else {
    const qMeaning = randMeaning(cur);
    questionText = escHtml(qMeaning);
    choiceContent = choices.map((c, i) => `<button class="choice-btn" onclick="answerTest(${c.no},${cur.no})" data-no="${c.no}"><span class="choice-key">${i+1}</span>${escHtml(c.word)}</button>`).join('');
  }

  sec.innerHTML = `<div class="quiz-card">
    <div class="quiz-progress">${state.testQIdx+1} / ${total}</div>
    <div class="quiz-progress-bar"><div class="quiz-progress-bar-fill" style="width:${pct}%"></div></div>
    <div class="quiz-type-label">${state.testMode==='en2jp'?'英語 → 日本語':'日本語 → 英語'}</div>
    <div class="quiz-question">${questionText}</div>
    <div class="choices" id="choices">${choiceContent}</div>
    <div id="result-area"></div>
    <div class="kbd-hint"><span><span class="kbd">1</span><span class="kbd">2</span><span class="kbd">3</span><span class="kbd">4</span> 選択 &nbsp;|&nbsp; 回答後: <span class="kbd">Enter</span> / <span class="kbd">Space</span> 次へ</span></div>
  </div>`;
}

window.answerTest = function(selectedNo, correctNo) {
  if (state.testAnswered) return;
  state.testAnswered = true;
  const isCorrect = selectedNo === correctNo;
  const cur = WORDS.find(w => w.no === correctNo);

  // Highlight
  document.querySelectorAll('.choice-btn').forEach(btn => {
    btn.disabled = true;
    const no = parseInt(btn.dataset.no);
    if (no === correctNo) btn.classList.add('correct');
    else if (no === selectedNo && !isCorrect) btn.classList.add('wrong');
  });

  if (isCorrect) { state.testScore++; markCorrect(correctNo); }
  else { state.testWrong.push(cur); markWrong(correctNo); }

  const allMeanings = cur.meanings.map(m => `<span>${escHtml(m)}</span>`).join(' / ');
  const resClass = isCorrect ? 'ok' : 'ng';
  const icon = isCorrect ? '⭕' : '❌';
  document.getElementById('result-area').innerHTML = `
    <div class="result-box ${resClass}">
      <div class="result-icon">${icon}</div>
      <div class="result-word">${escHtml(cur.word)}</div>
      <div class="result-meanings">${allMeanings}</div>
    </div>
    <button class="next-btn" onclick="nextTest()">次へ →</button>`;
};

window.nextTest = function() {
  state.testQIdx++;
  state.testAnswered = false;
  renderTestQuestion();
};

function renderTestScore() {
  const sec = document.getElementById('section-test');
  const total = state.testQueue.length;
  const pct = Math.round(state.testScore / total * 100);
  let wrongList = state.testWrong.length ?
    state.testWrong.map(w => `<div style="padding:6px 0;border-bottom:1px solid #f0f5f2;font-size:14px;"><b>${escHtml(w.word)}</b> — ${w.meanings.map(m=>escHtml(m)).join(' / ')}</div>`).join('') :
    '<div style="color:var(--green);font-weight:700;padding:12px 0;">全問正解！🎉</div>';

  sec.innerHTML = `<div class="score-card">
    <div class="big-score">${pct}%</div>
    <div class="score-label">${state.testScore} / ${total} 正解</div>
    <div class="btn-row" style="justify-content:center">
      <button class="btn-secondary" onclick="startTest()">もう一度</button>
      <button class="btn-secondary" onclick="renderTestSetup()">設定に戻る</button>
    </div>
    ${state.testWrong.length ? `<div style="margin-top:20px;text-align:left"><div style="font-size:13px;font-weight:700;color:var(--red);margin-bottom:8px;">間違えた単語 (${state.testWrong.length}語)</div>${wrongList}</div>` : ''}
  </div>`;
}

window.startTyping = function() {
  const pool = getRange(state.typingStart, state.typingEnd);
  if (!pool.length) { alert('範囲内の単語がありません'); return; }
  state.typingQueue = shuffle(pool);
  state.typingQIdx = 0; state.typingAnswered = false;
  state.typingScore = 0; state.typingWrong = [];
  renderTypingQuestion();
};

function renderTypingQuestion() {
  const sec = document.getElementById('section-typing');
  if (state.typingQIdx >= state.typingQueue.length) {
    renderTypingScore();
    return;
  }
  const cur = state.typingQueue[state.typingQIdx];
  const total = state.typingQueue.length;
  const pct = Math.round(state.typingQIdx / total * 100);
  const qMeaning = randMeaning(cur);

  sec.innerHTML = `<div class="quiz-card">
    <div class="quiz-progress">${state.typingQIdx+1} / ${total}</div>
    <div class="quiz-progress-bar"><div class="quiz-progress-bar-fill" style="width:${pct}%"></div></div>
    <div class="quiz-type-label">日本語 → 英語タイピング</div>
    <div class="quiz-question">${escHtml(qMeaning)}</div>
    <div class="typing-input-row">
      <input type="text" id="typing-input" placeholder="英単語を入力..." autocomplete="off" autocorrect="off" spellcheck="false" onkeydown="if(event.key==='Enter')submitTyping()">
      <button class="submit-btn" onclick="submitTyping()">確認</button>
    </div>
    <div id="typing-result"></div>
    <button class="btn-secondary" style="width:100%;margin-top:8px" onclick="skipTyping()">スキップ</button>
    <div class="kbd-hint"><span><span class="kbd">Enter</span> 確認 &nbsp;|&nbsp; 回答後: <span class="kbd">Enter</span> / <span class="kbd">Space</span> 次へ</span></div>
  </div>`;
  setTimeout(() => { const inp = document.getElementById('typing-input'); if(inp) inp.focus(); }, 100);
}

window.submitTyping = function() {
  if (state.typingAnswered) return;
  const cur = state.typingQueue[state.typingQIdx];
  const inp = document.getElementById('typing-input');
  if (!inp) return;
  const val = inp.value.trim().toLowerCase();
  if (!val) return;
  state.typingAnswered = true;
  inp.disabled = true;
  inp.blur(); // フォーカスを外してEnter/Spaceで次へ進めるようにする
  const isCorrect = val === cur.word.toLowerCase();
  if (isCorrect) { state.typingScore++; markCorrect(cur.no); }
  else { state.typingWrong.push(cur); markWrong(cur.no); }
  const allMeanings = cur.meanings.map(m=>escHtml(m)).join(' / ');
  const resClass = isCorrect ? 'ok' : 'ng';
  const icon = isCorrect ? '⭕' : '❌';
  document.getElementById('typing-result').innerHTML = `
    <div class="result-box ${resClass}">
      <div class="result-icon">${icon}</div>
      <div class="result-word">${escHtml(cur.word)}</div>
      <div class="result-meanings">${allMeanings}</div>
    </div>
    <button class="next-btn" onclick="nextTyping()">次へ →</button>`;
};

window.skipTyping = function() {
  if (state.typingAnswered) return;
  const cur = state.typingQueue[state.typingQIdx];
  state.typingAnswered = true;
  markWrong(cur.no);
  state.typingWrong.push(cur);
  const allMeanings = cur.meanings.map(m=>escHtml(m)).join(' / ');
  document.getElementById('typing-result').innerHTML = `
    <div class="result-box ng">
      <div class="result-icon">⏭</div>
      <div class="result-word">${escHtml(cur.word)}</div>
      <div class="result-meanings">${allMeanings}</div>
    </div>
    <button class="next-btn" onclick="nextTyping()">次へ →</button>`;
  const inp = document.getElementById('typing-input');
  if(inp) { inp.value = cur.word; inp.disabled = true; inp.blur(); }
};

window.nextTyping = function() {
  state.typingQIdx++; state.typingAnswered = false;
  renderTypingQuestion();
};

function renderTypingScore() {
  const sec = document.getElementById('section-typing');
  const total = state.typingQueue.length;
  const pct = Math.round(state.typingScore / total * 100);
  let wrongList = state.typingWrong.length ?
    state.typingWrong.map(w=>`<div style="padding:6px 0;border-bottom:1px solid #f0f5f2;font-size:14px;"><b>${escHtml(w.word)}</b> — ${w.meanings.map(m=>escHtml(m)).join(' / ')}</div>`).join('') :

function renderReviewTestQ() {
  const sec = document.getElementById('section-review');
  const wrongWords = WORDS.filter(w => wrongSet.has(w.no));
  if (state.reviewQIdx >= state.reviewQueue.length) {
    const remaining = WORDS.filter(w => wrongSet.has(w.no));
    sec.innerHTML = `<div class="score-card">
      <div style="font-size:48px;margin-bottom:12px;">✅</div>
      <div class="big-score" style="font-size:36px;">セッション終了</div>

      <div class="btn-row" style="justify-content:center">
        <button class="btn-secondary" onclick="startReview()">続ける</button>
        <button class="btn-secondary" onclick="renderReview()">戻る</button>
      </div>
    </div>`;
    return;
  }
  const cur = state.reviewQueue[state.reviewQIdx];
  const pool = WORDS.filter(w => wrongSet.has(w.no));
  const safePool = pool.length >= 4 ? pool : [...pool, ...WORDS.filter(w=>!wrongSet.has(w.no))].slice(0,20);
  const choices = getChoices(cur, safePool, true);
  const total = state.reviewQueue.length;
  const pct = Math.round(state.reviewQIdx / total * 100);

  const choiceContent = choices.map((c, i) => {
    const m = randMeaning(c);
    return `<button class="choice-btn" onclick="answerReviewTest(${c.no},${cur.no})" data-no="${c.no}"><span class="choice-key">${i+1}</span>${escHtml(m)}</button>`;
  }).join('');

  sec.innerHTML = `<div class="quiz-card">
    <div class="quiz-progress">${state.reviewQIdx+1} / ${total} &nbsp;|&nbsp; 残り間違い: ${wrongWords.length}語</div>
    <div class="quiz-progress-bar"><div class="quiz-progress-bar-fill" style="width:${pct}%"></div></div>

    <div class="kbd-hint"><span><span class="kbd">1</span><span class="kbd">2</span><span class="kbd">3</span><span class="kbd">4</span> 選択 &nbsp;|&nbsp; 回答後: <span class="kbd">Enter</span> / <span class="kbd">Space</span> 次へ</span></div>
  </div>`;
}

window.answerReviewTest = function(selectedNo, correctNo) {
  if (state.reviewAnswered) return;
  state.reviewAnswered = true;
  const isCorrect = selectedNo === correctNo;
  const cur = WORDS.find(w => w.no === correctNo);
  document.querySelectorAll('.choice-btn').forEach(btn => {
    btn.disabled = true;
    const no = parseInt(btn.dataset.no);
    if (no === correctNo) btn.classList.add('correct');
    else if (no === selectedNo && !isCorrect) btn.classList.add('wrong');
  });
  if (isCorrect) markCorrect(correctNo);
  else markWrong(correctNo);
  const allMeanings = cur.meanings.map(m=>escHtml(m)).join(' / ');
  const resClass = isCorrect ? 'ok' : 'ng';
  const icon = isCorrect ? '⭕' : '❌';
  const msg = isCorrect ? '正解！間違いリストから削除されました' : 'まだ間違いリストに残ります';
  document.getElementById('review-result').innerHTML = `
    <div class="result-box ${resClass}">
      <div class="result-icon">${icon}</div>
      <div class="result-word">${escHtml(cur.word)}</div>

    </div>

};

function renderWordList() {

window.exportData = function() {
  const data = {
    version: 1,
    exportedAt: new Date().toISOString(),
    wrongList: [...wrongSet],
    history: history,
  };
  const blob = new Blob([JSON.stringify(data, null, 2)], {type: 'application/json'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url; a.download = 'leap_data_' + new Date().toISOString().slice(0,10) + '.json';
  a.click(); URL.revokeObjectURL(url);
};

window.importData = function(input) {
  const file = input.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = function(e) {
    try {
      const data = JSON.parse(e.target.result);
      if (data.wrongList) wrongSet = new Set(data.wrongList);
      if (data.history) history = data.history;
      saveStorage();
      alert('インポート完了！ 間違い単語: ' + wrongSet.size + '語');
      renderSettings();
    } catch(err) {
      alert('インポートに失敗しました: ' + err.message);
    }
  };
  reader.readAsText(file);
  input.value = '';
};

window.resetWrong = function() {
  if (!confirm('間違いリストをクリアしますか？')) return;
  wrongSet.clear(); saveStorage();
  alert('間違いリストをクリアしました');
  renderSettings();
};

window.resetAll = function() {
  if (!confirm('全データをリセットしますか？この操作は取り消せません。')) return;
  wrongSet.clear(); history = {}; saveStorage();
  alert('全データをリセットしました');
  renderSettings();
};

// ── KEYBOARD SHORTCUTS ──
/*
  Study   : →/Space/Enter=次へ  ←=前へ
  Test    : 1-4=選択肢選択(回答前)  Enter/Space=次へ(回答後)
  Typing  : Enter=送信(既存・input内)  Enter/Space=次へ(回答後・input外)
  Review  : テスト/タイピングと同様
*/
document.addEventListener('keydown', function(e) {
  // inputにフォーカス中は Enter のみ各inputのinlineハンドラに任せ、他は無視
  // e.target でイベント発生元を判定（blur()後にactiveElementが変わっても正しく判定できる）
  const tag = e.target && e.target.tagName;
  const inInput = (tag === 'INPUT' || tag === 'TEXTAREA');

  const key = e.key;
  const sec = state.section;

  // ── 学習モード ──
  if (sec === 'study') {
    if (key === 'ArrowRight' || (!inInput && (key === ' ' || key === 'Enter'))) {
      e.preventDefault();
      studyNext();
    } else if (key === 'ArrowLeft') {
      e.preventDefault();
      studyPrev();
    }
    return;
  }

  // ── テストモード ──
  if (sec === 'test') {
    if (!inInput && (key === ' ' || key === 'Enter')) {
      e.preventDefault();
      if (state.testAnswered) {
        // 回答後 → 次へ
        nextTest();
      }
      return;
    }
    // 1-4 で選択肢を選ぶ（回答前のみ）
    if (!state.testAnswered && ['1','2','3','4'].includes(key)) {
      e.preventDefault();
      const btns = document.querySelectorAll('#choices .choice-btn:not(:disabled)');
      const idx = parseInt(key) - 1;
      if (btns[idx]) btns[idx].click();
    }
    return;
  }

  // ── タイピングモード ──
  if (sec === 'typing') {
    if (key === 'Enter' && inInput) return; // inline handleに任せる
    if (!inInput && (key === ' ' || key === 'Enter')) {
      e.preventDefault();
      if (state.typingAnswered) {
        nextTyping();
      }
    }
    return;
  }

  // ── 復習モード ──
  if (sec === 'review') {
    if (state.reviewMode === 'test') {
      if (!inInput && (key === ' ' || key === 'Enter')) {
        e.preventDefault();
        if (state.reviewAnswered) nextReviewTest();
        return;
      }
      if (!state.reviewAnswered && ['1','2','3','4'].includes(key)) {
        e.preventDefault();
        const btns = document.querySelectorAll('.choice-btn:not(:disabled)');
        const idx = parseInt(key) - 1;
        if (btns[idx]) btns[idx].click();
      }
    } else {
      // タイピング
      if (key === 'Enter' && inInput) return;
      if (!inInput && (key === ' ' || key === 'Enter')) {
        e.preventDefault();
        if (state.reviewAnswered) nextReviewTyping();
      }
    }
    return;
  }
});

// ── INIT ──
loadStorage();
showSection('study');
</script>
